<form id="roundSubmissionForm">
  <input type="hidden" name="hackathonId" value="HACKATHON_ID_FROM_BACKEND" />
  <input type="hidden" name="teamId" value="TEAM_ID_FROM_BACKEND" />
  <label>Round Number</label>
  <input type="number" name="roundNumber" required />

  <label>Submission Link (Google Drive, GitHub, etc.)</label>
  <input type="url" name="submissionLink" required />

  <button type="submit">Submit</button>
</form>

<script>
  document.getElementById("roundSubmissionForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const formData = new FormData(this);
    const body = {};
    formData.forEach((v, k) => body[k] = v);

    const token = localStorage.getItem("token"); // or get from cookie

    const response = await fetch("/api/round-submission/submit", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify(body)
    });

    const result = await response.json();
    alert(result.message);
  });
</script>
