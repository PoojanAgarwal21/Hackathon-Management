<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HackEase - Query</title>
  <link rel="stylesheet" href="participant.css" />
</head>

<body>
   <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="participant.html" class="logo">HackEase</a>
        <ul class="nav-links">
          <li><a href="participant.html" class="active">🏠 Home</a></li>
          <li><a href="application_participant.html">📄 My Applications</a></li>
          <li><a href="result_participant.html">🏆 Result</a></li>
          <li><a href="resources_participant.html">📘 Resources</a></li>
          <li><a href="query_participant.html">❓ Query</a></li>
          <li>
            <a href="profile.html" class="profile-btn active">👤 Profile</a>
          </li>
        </ul>
        <ul id="hackathonList"></ul>
        <div class="mobile-nav">
          <button class="mobile-nav-toggle" onclick="toggleMobileNav()">
            ☰
          </button>
          <div class="mobile-nav-menu" id="mobileMenu">
            <a href="participant.html" class="active">🏠 Home</a>
            <a href="application_participant.html">📄 My Applications</a>
            <a href="result_participant.html">🏆 Result</a>
            <a href="resources_participant.html">📘 Resources</a>
            <a href="query_participant.html">❓ Query</a>
          </div>
        </div>
      </div>
    </nav>

  <!-- Main Content -->
   
  <div class="main-content">
    <!-- Query Section -->
    <div id="query" class="page-section active">
      <h2>💬 Submit Your Query</h2>
      <p>Have questions about hackathons or projects? We're here to help!</p>
      <div class="query-form">
        <form onsubmit="submitQuery(event)">
          <div class="form-group">
            <label for="queryName">Your Name</label>
            <input type="text" id="queryName" required />
          </div>
          <div class="form-group">
            <label for="queryEmail">Email Address</label>
            <input type="email" id="queryEmail" required />
          </div>
          <div class="form-group">
            <label for="queryCategory">Query Category</label>
            <select id="queryCategory" required>
              <option value="">Select Category</option>
              <option value="registration">Registration Issues</option>
              <option value="technical">Technical Support</option>
              <option value="project">Project Guidelines</option>
              <option value="prizes">Prizes & Rewards</option>
              <option value="general">General Inquiry</option>
            </select>
          </div>
          <div class="form-group">
            <label for="queryMessage">Your Query</label>
            <textarea id="queryMessage" rows="5" placeholder="Please describe your query in detail..."
              required></textarea>
          </div>
          <button type="submit" class="submit-btn">Submit Query</button>
        </form>
      </div>
      <div class="query-form">
        <h3>Recent Queries</h3>
        <div class="recent-queries"></div>
      </div>
    </div>
  </div>

  <!-- Profile Edit Modal -->
  <div class="profile-edit-overlay" id="profileEditModal">
    <div class="profile-edit-modal">
      <div class="profile-edit-header">
        <h3>✏️ Edit Profile</h3>
      </div>
      <div class="profile-edit-body">
        <form id="profileEditForm">
          <div class="profile-form-group">
            <label for="editProfileName">👤 Full Name</label>
            <input type="text" id="editProfileName" required>
          </div>
          <div class="profile-form-group">
            <label for="editProfileEmail">📧 Email Address</label>
            <input type="email" id="editProfileEmail" required>
          </div>
          <div class="profile-form-group">
            <label for="editProfilePhone">📱 Phone Number</label>
            <input type="tel" id="editProfilePhone" required>
          </div>
        </form>
      </div>
      <div class="profile-edit-footer">
        <button class="btn-save-profile" onclick="saveProfile()">💾 Save Changes</button>
        <button class="btn-cancel-profile" onclick="closeProfileEdit()">❌ Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // newbackend..
function submitQuery() {
  const email = document.getElementById('email').value;
  const query = document.getElementById('query').value;

  fetch("http://localhost:5000/api/teams/query", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, query })
  })
  .then(res => res.json())
  .then(data => alert("Query submitted!"))
  .catch(err => alert("Error: " + err.message));
}
// done;
    // Profile Dropdown
    function toggleProfileDropdown() {
      const dropdown = document.getElementById("profileDropdown");
      dropdown.classList.toggle("show");
    }
    
    // Close dropdown when clicking outside
    // document.addEventListener("click", function (event) {
    //   const profileSection = document.querySelector(".profile-dropdown");
    //   const dropdown = document.getElementById("profileDropdown");
    //   if (!profileSection.contains(event.target)) {
    //     dropdown.classList.remove("show");
    //   }
    // });

    // Logout Function
    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        // 🧹 Clear session/localStorage
        localStorage.removeItem("loggedUser");
        localStorage.removeItem("myApplications"); // optional, if you want to clear apps too
        alert("✅ Logged out successfully!");
        // 🔁 Redirect to homepage/index
        window.location.href = '../index.html';
      }
    }

    // Load from localStorage
    function getQueries() {
      return JSON.parse(localStorage.getItem("participantQueries")) || [];
    }
    
    // Save to localStorage
    function saveQueries(queries) {
      localStorage.setItem("participantQueries", JSON.stringify(queries));
    }
    
    // Render recent queries
    function renderRecentQueries() {
      const container = document.querySelector(".recent-queries");
      const queries = getQueries();
      container.innerHTML = "";
      if (queries.length === 0) {
        container.innerHTML = "<p>No queries submitted yet.</p>";
        return;
      }
      queries.forEach((q) => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
        <div>
          <strong>${q.message}</strong>
          <br><small>Submitted on: ${q.submittedOn}</small>
          <br><small>Status: ${q.status}</small>
          ${q.status === "Resolved" && q.solution
            ? `<br><strong>Solution:</strong> ${q.solution}`
            : ""
          }
        </div>
      `;
        container.appendChild(div);
      });
    }
    
    // On Query Form Submit byy buliya
    function submitQuery(event) {
  event.preventDefault();

  const newQuery = {
    name: document.getElementById("queryName").value,
    email: document.getElementById("queryEmail").value,
    category: document.getElementById("queryCategory").value,
    message: document.getElementById("queryMessage").value
  };

  fetch("http://localhost:5000/api/query", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(newQuery)
  })
  .then(res => res.json())
  .then(data => {
    alert("✅ Query submitted successfully!");
    document.querySelector("form").reset();
  })
  .catch(err => {
    alert("❌ Error submitting query");
    console.error(err);
  });
}

// new added
function renderRecentQueries() {
  fetch("http://localhost:5000/api/query")
    .then(res => res.json())
    .then(data => {
      const container = document.querySelector(".recent-queries");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p>No queries submitted yet.</p>";
        return;
      }

      data.forEach(q => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <div>
            <strong>${q.message}</strong>
            <br><small>Submitted on: ${new Date(q.submittedOn).toLocaleDateString()}</small>
            <br><small>Status: ${q.status}</small>
            ${q.status === "resolved" && q.solution
              ? `<br><strong>Response:</strong> ${q.solution}`
              : ""
            }
          </div>
        `;
        container.appendChild(div);
      });
    })
    .catch(err => {
      console.error("Failed to load queries", err);
    });
}

    
    // Load on page
    document.addEventListener("DOMContentLoaded", renderRecentQueries);

    // NAVBAR JAVASCRIPT
    function toggleMobileNav() {
      const menu = document.getElementById('mobileMenu');
      menu.classList.toggle('active');
    }
    
    // Profile management functions
    function editProfile() {
      // Get current profile values
      const currentName = document.getElementById('profileName').textContent;
      const currentEmail = document.getElementById('profileEmail').textContent;
      const currentPhone = document.getElementById('profilePhone').textContent;
      // Populate the edit form
      document.getElementById('editProfileName').value = currentName;
      document.getElementById('editProfileEmail').value = currentEmail;
      document.getElementById('editProfilePhone').value = currentPhone;
      // Show the modal
      document.getElementById('profileEditModal').style.display = 'flex';
      // Close the profile dropdown
      document.getElementById('profileDropdown').classList.remove('show');
    }
    
    function saveProfile() {
      // Get new values
      const newName = document.getElementById('editProfileName').value.trim();
      const newEmail = document.getElementById('editProfileEmail').value.trim();
      const newPhone = document.getElementById('editProfilePhone').value.trim();
      // Validate inputs
      if (!newName || !newEmail || !newPhone) {
        alert('Please fill in all fields');
        return;
      }
      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(newEmail)) {
        alert('Please enter a valid email address');
        return;
      }
      // Phone validation (basic)
      const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
      if (!phoneRegex.test(newPhone.replace(/[\s\-\(\)]/g, ''))) {
        alert('Please enter a valid phone number');
        return;
      }
      // Update profile display
      document.getElementById('profileName').textContent = newName;
      document.getElementById('profileEmail').textContent = newEmail;
      document.getElementById('profilePhone').textContent = newPhone;
      // Close modal
      closeProfileEdit();
      // Show success message
      alert('Profile updated successfully! 🎉');
    }
    
    function closeProfileEdit() {
      document.getElementById('profileEditModal').style.display = 'none';
    }
    
    // Close modal when clicking outside
    document.addEventListener('click', function (e) {
      const modal = document.getElementById('profileEditModal');
      if (e.target === modal) {
        closeProfileEdit();
      }
    });
  </script>

</body>

</html>
