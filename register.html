<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Hackathon</title>
     <link rel="stylesheet" href="register.css" />
</head>

<body>
    <div class="register-container">
        <h2>Register for Hackathon</h2>
        <form class="register-form" id="registrationForm">
            <label>
                Team Name*
                <input type="text" name="teamName" id="teamName" required placeholder="Enter your team name" />
            </label>
            <label>
                Leader Name*
                <input type="text" name="leaderName" id="leaderName" required />
            </label>
            <label>
                Leader Email*
                <input type="email" name="leaderEmail" id="leaderEmail" required />
            </label>
            <label>
                Mobile*
                <input type="tel" name="mobile" id="mobile" required />
            </label>
            <label>
                Gender*
                <select name="gender" id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </label>
            <label>
                Institute Name*
                <input type="text" name="institute" id="institute" required />
            </label>

            <h3>Team Members</h3>
            <div id="teamMembersContainer">
                <div class="team-member">
                    <label>
                        Name
                        <input type="text" class="member-name" data-index="0" />
                    </label>
                    <label>
                        Email
                        <input type="email" class="member-email" data-index="0" />
                    </label>
                    <label>
                        Gender
                        <select class="member-gender" data-index="0">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </label>
                </div>
            </div>

            <button type="button" id="addMemberBtn">
                + Add Team Member
            </button>

            <button type="submit" class="submit-btn">
                Submit Registration
            </button>
        </form>
    </div>

    <script>
        let teamMemberCount = 1;
        // Get max team size from selected hackathon
const selectedHackathon = JSON.parse(localStorage.getItem("selectedHackathon"));
const maxTeamSize = selectedHackathon?.maxTeamSize || 5;
const maxAdditionalMembers = maxTeamSize - 1;


        // Add team member functionality
       document.getElementById('addMemberBtn').addEventListener('click', function () {
    if (teamMemberCount >= maxAdditionalMembers) {
       alert(`❌ You can only have up to ${maxTeamSize} members in total, including the leader.`);
          return;
    }
      const container = document.getElementById('teamMembersContainer');
            const newMemberDiv = document.createElement('div');
            newMemberDiv.className = 'team-member';
            newMemberDiv.innerHTML = `
                <label>
                    Name
                    <input
                        type="text"
                        class="member-name"
                        data-index="${teamMemberCount}"
                    />
                </label>
                <label>
                    Email
                    <input
                        type="email"
                        class="member-email"
                        data-index="${teamMemberCount}"
                    />
                </label>
                <label>
                    Gender
                    <select
                        class="member-gender"
                        data-index="${teamMemberCount}"
                    >
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </label>
            `;
            container.appendChild(newMemberDiv);
            if (teamMemberCount >= maxAdditionalMembers) {
    document.getElementById('addMemberBtn').disabled = true;
    document.getElementById('addMemberBtn').textContent = "Team Member Limit Reached";
}

            teamMemberCount++;
        });

        // Form submission functionality
    
    document.getElementById('registrationForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        // Check if user is logged in
        const token = localStorage.getItem("token");
        if (!token) {
            alert("Please login first!");
            window.location.href = "../login1.html";
            return;
        }

        // Get email from JWT token
        let leaderEmail = document.getElementById('leaderEmail').value;
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            leaderEmail = payload.email;
        } catch (e) {}

        const formData = {
            teamName: document.getElementById('teamName').value,
            leaderName: document.getElementById('leaderName').value,
            leaderEmail: leaderEmail,
            mobile: document.getElementById('mobile').value,
            gender: document.getElementById('gender').value,
            institute: document.getElementById('institute').value,
            teamMembers: []
        };

        // Team members
        const memberNames = document.querySelectorAll('.member-name');
        const memberEmails = document.querySelectorAll('.member-email');
        const memberGenders = document.querySelectorAll('.member-gender');

        for (let i = 0; i < memberNames.length; i++) {
            formData.teamMembers.push({
                name: memberNames[i].value,
                email: memberEmails[i].value,
                gender: memberGenders[i].value
            });
        }

        // Get hackathonId from localStorage
        const selectedHackathon = JSON.parse(localStorage.getItem("selectedHackathon"));
        if (!selectedHackathon || !selectedHackathon._id) {
            alert("❌ Hackathon not selected properly.");
            return;
        }

        formData.hackathonId = selectedHackathon._id;

        // Send to backend
        try {
            const response = await fetch("http://localhost:5000/api/registration/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (!response.ok) {
                alert(`❌ Failed to register: ${data.message}`);
                return;
            }

            alert("✅ Registered successfully!");
         window.location.href = "application_participant.html";

        } catch (err) {
            console.error("❌ Error:", err);
            alert("❌ Registration failed due to network error.");
        }
    });


    </script>
</body>

</html>
