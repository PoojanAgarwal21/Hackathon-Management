<div id="submissionsContainer"></div>

<script>
  const hackathonId = "HACKATHON_ID"; // Inject from backend/session
  const token = localStorage.getItem("token");

  async function loadSubmissions() {
    const res = await fetch(`/api/round-submission/judge/${hackathonId}`, {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const data = await res.json();
    const container = document.getElementById("submissionsContainer");

    data.forEach(sub => {
      const div = document.createElement("div");
      div.innerHTML = `
        <h3>${sub.teamId.teamName}</h3>
        <p>Round: ${sub.roundNumber}</p>
        <p>Link: <a href="${sub.submissionLink}" target="_blank">${sub.submissionLink}</a></p>
        <p>Submitted At: ${new Date(sub.submittedAt).toLocaleString()}</p>
        <hr/>
      `;
      container.appendChild(div);
    });
  }

  loadSubmissions();
</script>
