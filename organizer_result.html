<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="organizer_result.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon</title>

</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="organizer.html" class="logo">HackEase</a>
            <ul class="nav-links">
                <li><a href="organizer.html">🏠 Home</a></li>
                <li><a href="organizer_teams.html">👥 Teams</a></li>
                <li><a href="organizer_result.html">🏆 Result</a></li>
                <li><a href="organizer_judges.html">👨‍⚖️ Judges</a></li>
                <li><a href="organizer_query.html">❓ Queries</a></li>
                <li class="profile-dropdown">
                    <a href="profile.html" class="profile-btn">👤 Profile</a>
                </li>
            </ul>
            <div class="mobile-nav">
                <button class="mobile-nav-toggle" onclick="toggleMobileNav()">☰</button>
                <div class="mobile-nav-menu" id="mobileMenu">
                    <a href="organizer.html">🏠 Home</a>
                    <a href="organizer_teams.html">👥 Teams</a>
                    <a href="organizer_result.html">🏆 Result</a>
                    <a href="organizer_judges.html">👨‍⚖️ Judges</a>
                    <a href="organizer_query.html">❓ Queries</a>
                    <a href="profile.html">👤 Profile</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🎯 Hackathon Results</h1>
            <p>Manage and View Your Hackathon Results</p>
        </div>

        <button class="back-btn" onclick="showHackathonList()">← Back to Hackathon List</button>

        <!-- Hackathon List Section -->
        <div class="hackathon-list-section" id="hackathonListSection">
            <div class="hackathon-list" id="hackathonList">
                <!-- Hackathon cards will be populated here -->
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <div>
                    <div class="results-title" id="resultsTitle">Hackathon Results</div>
                    <div class="results-date" id="resultsDate">Date</div>
                </div>
            </div>

            <div class="leaderboard">
                <div class="leaderboard-header">
                    🏆 Final Leaderboard
                </div>
                <div id="leaderboardContent">
                    <!-- Leaderboard will be populated here -->
                </div>
            </div>
        </div>
    </div>

<!-- Profile Edit Modal -->
<div class="profile-edit-overlay" id="profileEditModal">
    <div class="profile-edit-modal">
        <div class="profile-edit-header">
            <h3>✏️ Edit Profile</h3>
        </div>
        <div class="profile-edit-body">
            <form id="profileEditForm">
                <div class="profile-form-group">
                    <label for="editProfileName">👤 Full Name</label>
                    <input type="text" id="editProfileName" required>
                </div>
                <div class="profile-form-group">
                    <label for="editProfileEmail">📧 Email Address</label>
                    <input type="email" id="editProfileEmail" required>
                </div>
                <div class="profile-form-group">
                    <label for="editProfilePhone">📱 Phone Number</label>
                    <input type="tel" id="editProfilePhone" required>
                </div>
            </form>
        </div>
        <div class="profile-edit-footer">
            <button class="btn-save-profile" onclick="saveProfile()">💾 Save Changes</button>
            <button class="btn-cancel-profile" onclick="closeProfileEdit()">❌ Cancel</button>
        </div>
    </div>
</div>

    <script>
        // Remove dummy data and use real backend data
        async function fetchMyHackathons() {
            const token = localStorage.getItem('token');
            const res = await fetch('http://localhost:5000/api/hackathon/my', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            return res.json();
        }

        async function fetchHackathonResults(hackathonId) {
            const token = localStorage.getItem('token');
            const res = await fetch(`http://localhost:5000/api/judge/results/${hackathonId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) return null;
            return res.json();
        }

        let hackathonsData = [];

        document.addEventListener('DOMContentLoaded', async function () {
            hackathonsData = await fetchMyHackathons();
            displayHackathonList();
        });

        async function displayHackathonList() {
            const hackathonList = document.getElementById('hackathonList');
            hackathonList.innerHTML = '';
            for (const hackathon of hackathonsData) {
                // Only show completed hackathons (where results are published)
                const results = await fetchHackathonResults(hackathon._id);
                if (!results || !results.submissions || results.submissions.length === 0) continue;
                const card = document.createElement('div');
                card.className = 'hackathon-card';
                card.onclick = () => showResults(hackathon._id);
                card.innerHTML = `
                    <div class="hackathon-name">${hackathon.title}</div>
                    <div class="hackathon-date">${new Date(hackathon.regEnd).toLocaleDateString()}</div>
                    <div class="hackathon-stats">
                        <div class="stat-item">
                            <div class="stat-number">${hackathon.maxTeamSize || '-'}</div>
                            <div class="stat-label">Max Team Size</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number">${results.submissions.length}</div>
                            <div class="stat-label">Results</div>
                        </div>
                    </div>
                    <div class="status-badge status-completed">Results Available</div>
                `;
                hackathonList.appendChild(card);
            }
        }

        async function showResults(hackathonId) {
            const hackathon = hackathonsData.find(h => h._id === hackathonId);
            if (!hackathon) return;
            const results = await fetchHackathonResults(hackathonId);
            if (!results || !results.submissions || results.submissions.length === 0) {
                alert('Results not available yet.');
                return;
            }
            document.getElementById('resultsTitle').textContent = hackathon.title + ' - Results';
            document.getElementById('resultsDate').textContent = new Date(hackathon.regEnd).toLocaleDateString();
            // Sort by finalRank
            const sortedResults = [...results.submissions].sort((a, b) => a.finalRank - b.finalRank);
            const leaderboardContent = document.getElementById('leaderboardContent');
            leaderboardContent.innerHTML = sortedResults.map((result, index) => {
                const position = result.finalRank;
                const positionClass = getPositionClass(position);
                const trophy = getTrophy(position);
                const feedback = result.evaluations && result.evaluations.length > 0 ? result.evaluations[0].feedback : '';
                return `
                    <div class="team-row">
                        <div class="position ${positionClass}">${position}</div>
                        <div class="team-info">
                            <div class="team-name">${result.teamName}</div>
                            <div class="team-members">Leader: ${result.leaderName}</div>
                            <div class="judge-comments">
                                "${feedback}"
                            </div>
                        </div>
                        <div class="team-score">
                            <div class="score-value">${result.finalScore}</div>
                            <div class="score-label">Points</div>
                        </div>
                        <div class="trophy">${trophy}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('hackathonListSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'block';
            document.querySelector('.back-btn').style.display = 'block';
        }

        function showHackathonList() {
            document.getElementById('hackathonListSection').style.display = 'block';
            document.getElementById('resultsSection').style.display = 'none';
            document.querySelector('.back-btn').style.display = 'none';
        }

        function getPositionClass(position) {
            switch (position) {
                case 1: return 'first';
                case 2: return 'second';
                case 3: return 'third';
                default: return 'other';
            }
        }

        function getTrophy(position) {
            switch (position) {
                case 1: return '🥇';
                case 2: return '🥈';
                case 3: return '🥉';
                default: return '';
            }
        }

        function toggleMobileNav() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
        }


        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profileDropdown');
            const mobileDropdown = document.getElementById('mobileProfileDropdown');

            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                mobileDropdown.classList.toggle('show');
                dropdown.classList.remove('show');
            } else {
                dropdown.classList.toggle('show');
                mobileDropdown.classList.remove('show');
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                // Simulate logout - redirect to index.html
                window.location.href = '../index.html';
            }
        }

        // Profile management functions
function editProfile() {
    // Get current profile values
    const currentName = document.getElementById('profileName').textContent;
    const currentEmail = document.getElementById('profileEmail').textContent;
    const currentPhone = document.getElementById('profilePhone').textContent;
    
    // Populate the edit form
    document.getElementById('editProfileName').value = currentName;
    document.getElementById('editProfileEmail').value = currentEmail;
    document.getElementById('editProfilePhone').value = currentPhone;
    
    // Show the modal
    document.getElementById('profileEditModal').style.display = 'flex';
    
    // Close the profile dropdown
    document.getElementById('profileDropdown').classList.remove('show');
}

function saveProfile() {
    // Get new values
    const newName = document.getElementById('editProfileName').value.trim();
    const newEmail = document.getElementById('editProfileEmail').value.trim();
    const newPhone = document.getElementById('editProfilePhone').value.trim();
    
    // Validate inputs
    if (!newName || !newEmail || !newPhone) {
        alert('Please fill in all fields');
        return;
    }
    
    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(newEmail)) {
        alert('Please enter a valid email address');
        return;
    }
    
    // Phone validation (basic)
    const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
    if (!phoneRegex.test(newPhone.replace(/[\s\-\(\)]/g, ''))) {
        alert('Please enter a valid phone number');
        return;
    }
    
    // Update profile display
    document.getElementById('profileName').textContent = newName;
    document.getElementById('profileEmail').textContent = newEmail;
    document.getElementById('profilePhone').textContent = newPhone;
    
    // Close modal
    closeProfileEdit();
    
    // Show success message
    alert('Profile updated successfully! 🎉');
}

function closeProfileEdit() {
    document.getElementById('profileEditModal').style.display = 'none';
}

// Close modal when clicking outside
document.addEventListener('click', function(e) {
    const modal = document.getElementById('profileEditModal');
    if (e.target === modal) {
        closeProfileEdit();
    }
});

    </script>
</body>

</html>
