<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackEase - Judge Panel</title>
    <link rel="stylesheet" href="judge_panel.css" />
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="judge_panel.html" class="logo">HackEase</a>
            <ul class="nav-links">
                <li><a href="judge_panel.html" class="active">Dashboard</a></li>
                <li><a href="evaluate_projects.html">Evaluate Projects</a></li>
                <li><a href="result.html">Results</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </div>
    </nav>

    <!-- Welcome Section -->
    <section class="welcome-section">
        <h1 class="welcome-title">Welcome Judge</h1>
        <p class="welcome-subtitle">Manage and evaluate hackathons with ease</p>
        
<!-- Stats Cards -->
<div class="stats-container">
  <div class="stat-card">
    <div class="stat-number" id="activeHackathons">0</div>
    <div class="stat-label">Active Hackathons</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="totalSubmissions">0</div>
    <div class="stat-label">Total Submissions</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="evaluatedProjects">0</div>
    <div class="stat-label">Evaluated Projects</div>
  </div>
</div>

    <!-- Hackathons Section -->
    <section class="hackathons-section">
        <h2 class="section-title">Your Assigned Hackathons</h2>
        <div class="hackathons-grid" id="hackathonsGrid">
            <!-- Hackathon cards will be populated by JavaScript -->
        </div>
    </section>

    <!-- Modal for Hackathon Details -->
    <div id="hackathonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close">&times;</span>
                <h2 class="modal-title" id="modalTitle"></h2>
                <p id="modalOrganizer"></p>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
    async function fetchAssignedHackathons() {
  try {
    const res = await fetch("http://localhost:5000/api/judge/assigned", {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token"),
      },
    });
    const data = await res.json();
    console.log("📦 Assigned Hackathons:", data);
    populateHackathons(data); // ✅ THIS MUST PASS 'data'
  } catch (err) {
    console.error("Error fetching assigned hackathons:", err);
  }
}

async function fetchStats() {
  try {
    const token = localStorage.getItem("token");
    const res = await fetch("http://localhost:5000/api/judge/stats", {
      headers: {
        Authorization: "Bearer " + token,
      },
    });

    const data = await res.json();

    document.getElementById("activeHackathons").innerText = data.activeHackathons;
    document.getElementById("totalSubmissions").innerText = data.totalSubmissions;
    document.getElementById("evaluatedProjects").innerText = data.evaluatedProjects;
   } catch (err) {
    console.error("❌ Error fetching stats:", err);
  }
}


// Update populate function to accept parameter
function populateHackathons(hackathons) {
  const grid = document.getElementById('hackathonsGrid');
  grid.innerHTML = "";

  if (hackathons.length === 0) {
    grid.innerHTML = "<p>No hackathons assigned yet.</p>";
    return;
  }

  hackathons.forEach(hackathon => {
    const card = document.createElement('div');
    card.className = 'hackathon-card';
    card.onclick = () => showHackathonDetails(hackathon); // if you want modal

    const duration = hackathon.rounds && hackathon.rounds.length > 0
      ? `${new Date(hackathon.rounds[0].start).toLocaleDateString()} - ${new Date(hackathon.rounds.at(-1).end).toLocaleDateString()}`
      : "TBD";

    card.innerHTML = `
      <div class="card-header">
        <div class="status-badge ongoing">Ongoing</div>
        <div class="card-title">${hackathon.title}</div>
        <div class="card-organizer">by ${hackathon.createdBy}</div>
      </div>
      <div class="card-body">
        <div class="detail-row">
          <span class="detail-label">Date:</span>
          <span class="detail-value">${new Date(hackathon.regStart).toLocaleDateString()}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Duration:</span>
          <span class="detail-value">${duration}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Location:</span>
          <span class="detail-value">${hackathon.location}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Participants:</span>
          <span class="detail-value">--</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Prizes:</span>
          <span class="detail-value">${[hackathon.prize1, hackathon.prize2, hackathon.prize3].filter(Boolean).join(', ') || "N/A"}</span>
        </div>
        ${hackathon.sponsor ? `
        <div class="detail-row">
          <span class="detail-label">Sponsor:</span>
          <span class="detail-value">🏢 ${hackathon.sponsor.name}${hackathon.sponsor.website ? ` (<a href="${hackathon.sponsor.website}" target="_blank">${hackathon.sponsor.website}</a>)` : ''}</span>
        </div>
        ` : ''}
      </div>
     <div class="card-footer">
  <button class="view-details-btn" onclick="location.href='judge_hackathon_details.html?id=${hackathon._id}'">
    View Details & Submissions
  </button>
</div>

    `;

    grid.appendChild(card);
  });
}


// Call on page load
document.addEventListener('DOMContentLoaded', function() {
    fetchAssignedHackathons();
    fetchStats();
});


      
        // Show hackathon details in modal
        function showHackathonDetails(hackathon) {
            const modal = document.getElementById('hackathonModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalOrganizer = document.getElementById('modalOrganizer');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = hackathon.title;
            modalOrganizer.textContent = `Organized by ${hackathon.organizer}`;
            
            modalBody.innerHTML = `
                <div class="detail-section">
                    <h3>Overview</h3>
                    <p>${hackathon.description}</p>
                </div>
                
                <div class="detail-section">
                    <h3>Event Details</h3>
                    <div class="detail-row">
                        <span class="detail-label">Date:</span>
                        <span class="detail-value">${hackathon.date}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Duration:</span>
                        <span class="detail-value">${hackathon.duration}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Location:</span>
                        <span class="detail-value">${hackathon.location}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status:</span>
                        <span class="detail-value">${hackathon.status}</span>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>Timeline</h3>
                    ${hackathon.timeline.map(item => `<div class="timeline-item">${item}</div>`).join('')}
                </div>
                
                <div class="detail-section">
                    <h3>Categories</h3>
                    <p>${hackathon.categories.join(' • ')}</p>
                </div>
                
                <div class="detail-section">
                    <h3>Judging Criteria</h3>
                    <p>${hackathon.judgingCriteria.join(' • ')}</p>
                </div>
                
                <div class="detail-section">
                    <h3>Participation & Prizes</h3>
                    <div class="detail-row">
                        <span class="detail-label">Total Participants:</span>
                        <span class="detail-value">${hackathon.totalParticipants}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Prize Pool:</span>
                        <span class="detail-value">${hackathon.prizes}</span>
                    </div>
                </div>
                
                <div style="margin-top: 2rem;">
                    <button class="view-details-btn" style="margin-bottom: 1rem;">View Submissions</button>
                    <button class="view-details-btn" style="background: linear-gradient(135deg, #48bb78, #38a169);">Start Evaluation</button>
                </div>
            `;
            
            modal.style.display = 'block';
        }

        // Close modal
        document.querySelector('.close').onclick = function() {
            document.getElementById('hackathonModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('hackathonModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // // Initialize the page
        // document.addEventListener('DOMContentLoaded', function() {
        //     populateHackathons();
        // });
    </script>
</body>
</html>
